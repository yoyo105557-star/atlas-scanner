name: Atlas JSON Sync

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "Paste Atlas candidate JSON"
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Validate and send JSON
        env:
          ATLAS_WORKER_URL: ${{ secrets.ATLAS_WORKER_URL }}
          ATLAS_API_KEY: ${{ secrets.ATLAS_API_KEY }}
          ATLAS_PAYLOAD: ${{ inputs.payload }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          worker_url = os.environ.get("ATLAS_WORKER_URL")
          api_key = os.environ.get("ATLAS_API_KEY")
          raw_payload = os.environ.get("ATLAS_PAYLOAD")

          if not worker_url:
              raise RuntimeError("Missing ATLAS_WORKER_URL")

          if not api_key:
              raise RuntimeError("Missing ATLAS_API_KEY")

          if not raw_payload:
              raise RuntimeError("Missing JSON payload")

          try:
              payload = json.loads(raw_payload)
          except json.JSONDecodeError as error:
              raise RuntimeError(f"Invalid JSON: {error}") from error

          body = json.dumps(payload, ensure_ascii=False).encode("utf-8")

          request = urllib.request.Request(
              worker_url,
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "x-atlas-key": api_key,
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  result = response.read().decode("utf-8")
                  print(result)

          except urllib.error.HTTPError as error:
              result = error.read().decode("utf-8", errors="replace")
              print(result)
              raise
          PY

name: Atlas JSON Sync

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "Paste Atlas candidate JSON"
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Validate JSON
        env:
          ATLAS_PAYLOAD: ${{ inputs.payload }}
        run: |
          python - <<'PY'
          import json
          import os

          raw = os.environ.get("ATLAS_PAYLOAD", "")

          if not raw:
              raise RuntimeError("Missing JSON payload")

          try:
              payload = json.loads(raw)
          except json.JSONDecodeError as error:
              raise RuntimeError(f"Invalid JSON: {error}") from error

          with open("atlas_payload.json", "w", encoding="utf-8") as file:
              json.dump(payload, file, ensure_ascii=False)

          print("JSON validation passed")
          print(json.dumps(payload, ensure_ascii=False, indent=2))
          PY

      - name: Send JSON to Atlas Worker
        env:
          ATLAS_WORKER_URL: ${{ secrets.ATLAS_WORKER_URL }}
          ATLAS_API_KEY: ${{ secrets.ATLAS_API_KEY }}
        run: |
          if [ -z "$ATLAS_WORKER_URL" ]; then
            echo "Missing ATLAS_WORKER_URL"
            exit 1
          fi

          if [ -z "$ATLAS_API_KEY" ]; then
            echo "Missing ATLAS_API_KEY"
            exit 1
          fi

          curl --fail-with-body \
            --request POST \
            --url "$ATLAS_WORKER_URL" \
            --header "Content-Type: application/json" \
            --header "x-atlas-key: $ATLAS_API_KEY" \
            --data-binary "@atlas_payload.json"
